# .github/workflows/build-16k.yml
name: Android Breakpad Build with True 16K Page Support

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use China Mirror for Ubuntu
        run: |
          sudo sed -i 's/archive.ubuntu.com/mirrors.aliyun.com/g' /etc/apt/sources.list
          sudo apt-get update

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew :breakpad-android:assembleRelease :android-crash:assembleRelease

      - name: Upload breakpad-android AAR
        uses: actions/upload-artifact@v4
        with:
          name: breakpad-android-release-16k
          path: breakpad-android/build/outputs/aar/*.aar

      - name: Upload android-crash AAR
        uses: actions/upload-artifact@v4
        with:
          name: android-crash-release-16k
          path: android-crash/build/outputs/aar/*.aar
